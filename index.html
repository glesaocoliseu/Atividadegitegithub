<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Scanner GLMax - OCR</title>
    <style>
        body {
            font-family: sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 20px;
            background-color: #f0f2f5;
        }
        .container {
            max-width: 500px;
            width: 100%;
            background: white;
            padding: 20px;
            border-radius: 12px;
            box-shadow: 0 4px 10px rgba(0,0,0,0.1);
            text-align: center;
        }
        h2 { color: #1a73e8; }
        #preview {
            width: 100%;
            max-height: 300px;
            object-fit: contain;
            margin-top: 15px;
            display: none;
            border: 2px solid #ddd;
        }
        button {
            background-color: #1a73e8;
            color: white;
            border: none;
            padding: 12px 20px;
            margin: 10px 5px;
            border-radius: 6px;
            cursor: pointer;
            font-size: 16px;
        }
        button:disabled { background-color: #ccc; }
        textarea {
            width: 100%;
            height: 150px;
            margin-top: 15px;
            padding: 10px;
            border-radius: 6px;
            border: 1px solid #ccc;
            box-sizing: border-box;
        }
        .loading { color: #ef6c00; font-weight: bold; display: none; }
    </style>
</head>
<body>

<div class="container">
    <h2>Scanner GLMax</h2>
    
    <input type="file" id="fileInput" accept="image/*" capture="environment" style="display:none">
    
    <button onclick="document.getElementById('fileInput').click()">📸 Tirar Foto / Selecionar</button>
    <button id="btnExtrair" onclick="extrairTexto()" disabled>🔍 Extrair Texto</button>
    
    <img id="preview" alt="Sua foto aparecerá aqui">
    
    <div id="status" class="loading">Processando imagem... aguarde...</div>
    
    <textarea id="resultado" placeholder="O texto extraído aparecerá aqui..."></textarea>
</div>

<script>
    const fileInput = document.getElementById('fileInput');
    const preview = document.getElementById('preview');
    const btnExtrair = document.getElementById('btnExtrair');
    const resultado = document.getElementById('resultado');
    const status = document.getElementById('status');

    let base64Image = "";

    // Quando o usuário seleciona ou tira a foto
    fileInput.addEventListener('change', function(e) {
        const file = e.target.files[0];
        if (file) {
            const reader = new FileReader();
            reader.onload = function(event) {
                preview.src = event.target.result;
                preview.style.display = "block";
                base64Image = event.target.result; // Mantém o prefixo data:image/...
                btnExtrair.disabled = false;
            };
            reader.readAsDataURL(file);
        }
    });

    async function extrairTexto() {
        const apiKey = "K86822256088957"; // Sua chave inserida aqui
        
        status.style.display = "block";
        btnExtrair.disabled = true;
        resultado.value = "";

        // Prepara os dados para a API (Formdata é o padrão da OCR.space)
        const formData = new FormData();
        formData.append("base64Image", base64Image);
        formData.append("language", "por");
        formData.append("apikey", apiKey);

        try {
            const response = await fetch("https://api.ocr.space/parse/image", {
                method: "POST",
                body: formData
            });

            const data = await response.json();

            if (data.ParsedResults && data.ParsedResults.length > 0) {
                resultado.value = data.ParsedResults[0].ParsedText;
            } else {
                resultado.value = "Erro: Não foi possível ler o texto. Verifique a qualidade da imagem.";
            }
        } catch (error) {
            resultado.value = "Erro na conexão: " + error.message;
        } finally {
            status.style.display = "none";
            btnExtrair.disabled = false;
        }
    }
</script>

</body>
</html>
