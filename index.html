<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Leitor de QR Code</title>
  <script src="https://unpkg.com/html5-qrcode"></script>

  <style>
    body {
      font-family: Arial, sans-serif;
      text-align: center;
      background: #f4f4f4;
      margin: 0;
      padding: 10px;
    }

    h1 {
      font-size: 22px;
      margin: 10px 0;
    }

    #reader {
      width: 100%;
      max-width: 350px;
      margin: 15px auto;
      border-radius: 12px;
      overflow: hidden;
      background: black;
    }

    #result {
      margin-top: 15px;
      font-size: 16px;
      font-weight: bold;
      padding: 10px;
      word-break: break-word;
    }

    .buttons {
      display: flex;
      justify-content: center;
      gap: 10px;
      flex-wrap: wrap;
    }

    button {
      flex: 1;
      max-width: 150px;
      padding: 12px;
      font-size: 16px;
      border: none;
      border-radius: 8px;
      cursor: pointer;
    }

    #startBtn { background: #28a745; color: white; }
    #stopBtn { background: #dc3545; color: white; }

    @media (min-width: 600px) {
      h1 { font-size: 26px; }
      #result { font-size: 18px; }
    }
  </style>
</head>
<body>

<h1>📷 Leitor de QR Code</h1>

<div id="reader"></div>

<div class="buttons">
  <button id="startBtn">Iniciar</button>
  <button id="stopBtn">Parar</button>
</div>

<div id="result">Resultado: nenhum</div>

<script>
let html5QrCode = null;
let isRunning = false;

function onScanSuccess(decodedText) {
  document.getElementById("result").innerText = "Resultado: " + decodedText;
}

document.getElementById("startBtn").addEventListener("click", async () => {
  if (isRunning) return;

  try {
    if (!html5QrCode) {
      html5QrCode = new Html5Qrcode("reader");
    }

    // 📱 usa câmera traseira no celular
    await html5QrCode.start(
      { facingMode: "environment" },
      {
        fps: 10,
        qrbox: { width: 250, height: 250 }
      },
      onScanSuccess
    );

    isRunning = true;

  } catch (err) {
    console.error(err);
    alert("Erro ao acessar câmera: " + err);
  }
});

document.getElementById("stopBtn").addEventListener("click", async () => {
  if (html5QrCode && isRunning) {
    try {
      await html5QrCode.stop();
      document.getElementById("result").innerText = "Leitor parado.";
      isRunning = false;
    } catch (err) {
      console.error(err);
    }
  }
});
</script>

</body>
</html>
